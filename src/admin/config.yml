# Decap CMS schema for the Hepp for Rep campaign site.
#
# Editing principle: every typographic decision the design language
# makes is either (a) template-side and not editable, or (b) a
# structured field with a constrained editor. Plain markdown text
# fields are rare and always have a restricted toolbar so editors
# cannot break the design hierarchy.
#
# YAML anchors at the top define the three standard markdown-toolbar
# shapes; per-field references keep the schema DRY and make global
# rule changes a one-place edit.

# ── Backend ────────────────────────────────────────────────────────
# GitHub backend with the editorial workflow turned on: Decap edits
# land on cms/* branches and merge to main when "Publish" is clicked.
# This is what gates draft pages behind the admin login.
backend:
  name: github
  repo: blolt/hepp4rep
  branch: main
  # NOTE: GitHub OAuth requires an OAuth proxy. Setup options are
  # documented in docs/setup-decap-cloudflare.md.

publish_mode: editorial_workflow

media_folder: content/images
public_folder: /images

# ── Toolbar presets (YAML anchors) ─────────────────────────────────
# Defined here so global rule changes (e.g. "now allow strikethrough
# in body copy") are a one-place edit.
_toolbars:
  tight_inline: &tight_inline
    buttons: [bold, link]
    editor_components: []
    modes: [rich_text]
  body_prose: &body_prose
    buttons: [bold, italic, link]
    editor_components: []
    modes: [rich_text]
  stat_emphasis: &stat_emphasis
    buttons: [bold]
    editor_components: []
    modes: [rich_text]

collections:

  # ── Site settings (single-file collection) ───────────────────────
  - name: settings
    label: Site settings
    files:
      - name: site
        label: Global settings
        file: content/settings/site.yml
        fields:
          - { name: contact_email, label: Contact email, widget: string }
          - { name: committee_disclaimer, label: Committee disclaimer, widget: string }
          - { name: copyright_holder, label: Copyright holder, widget: string }
          - name: socials
            label: Social links
            widget: list
            fields:
              - name: platform
                label: Platform
                widget: select
                options: [Instagram, TikTok, Facebook, Bluesky, Twitter, YouTube]
              - { name: url, label: URL, widget: string }
          - name: primary_cta
            label: Primary CTA destination (used in nav)
            widget: object
            fields:
              - { name: label, label: Button label, widget: string }
              - name: target
                label: Target
                widget: string
                hint: "URL or page anchor (e.g. #get-involved)"

      - name: nav
        label: Primary navigation
        file: content/settings/nav.yml
        fields:
          - name: links
            label: Nav links
            widget: list
            fields:
              - { name: label, widget: string }
              - { name: target, widget: string, hint: "URL or anchor (e.g. /about/, /#priorities)" }

  # ── Pages (file collection: home + about) ────────────────────────
  - name: pages
    label: Pages
    files:

      - name: home
        label: Home page
        file: content/pages/home.md
        fields:

          # Hero
          - name: hero
            label: Hero section
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string, hint: "Office line above the candidate name" }
              - { name: name, label: Candidate name, widget: string }
              - { name: district_line, label: District line, widget: string, hint: "Neighborhoods, separated by ' · '" }
              - { name: tagline, label: Tagline, widget: string }
              - name: subhead
                label: Subhead
                widget: markdown
                <<: *tight_inline
                hint: "Inline emphasis only. Use **bold** sparingly for the headline figure."
              - name: primary_cta
                label: Primary CTA
                widget: object
                fields:
                  - { name: label, widget: string }
                  - { name: target, widget: string }
              - name: secondary_cta
                label: Secondary CTA
                widget: object
                required: false
                fields:
                  - { name: label, widget: string }
                  - { name: target, widget: string }

          # About teaser
          - name: about_teaser
            label: About section (homepage teaser)
            widget: object
            fields:
              - { name: heading, widget: string }
              - { name: lede, widget: markdown, <<: *body_prose }
              - { name: body, widget: markdown, <<: *body_prose }
              - { name: link_text, widget: string, required: false }
              - { name: link_target, widget: string, required: false }

          # Priorities — references the priorities collection
          - name: priorities_section
            label: Priorities section
            widget: object
            fields:
              - { name: heading, widget: string }
              - { name: lede, widget: markdown, <<: *body_prose }
              - name: priorities
                label: Priorities to show on home page (max 3)
                widget: relation
                collection: priorities
                value_field: slug
                search_fields: [label, heading]
                display_fields: [label, heading]
                multiple: true
                min: 1
                max: 3
                hint: "Pick exactly the 3 priorities to show on the homepage. Order here = display order."

          # In Focus — references signature issues collection
          - name: in_focus
            label: In Focus section
            widget: object
            fields:
              - { name: eyebrow, widget: string }
              - name: current_issue
                label: Current signature issue
                widget: relation
                collection: issues
                value_field: slug
                search_fields: [name, heading]
                display_fields: [name]

          # Get involved — three CTA cards
          - name: get_involved
            label: Get involved section
            widget: object
            fields:
              - { name: heading, widget: string }
              - name: email_card
                widget: object
                label: Email signup card
                fields:
                  - { name: heading, widget: string }
                  - { name: body, widget: markdown, <<: *body_prose }
                  - { name: form_action, widget: string, hint: "ESP form action URL (Mailchimp, etc.) — '#' until configured." }
                  - { name: submit_label, widget: string, default: "Sign up" }
              - name: volunteer_card
                widget: object
                label: Volunteer card
                fields:
                  - { name: heading, widget: string }
                  - { name: body, widget: markdown, <<: *body_prose }
                  - { name: cta_label, widget: string }
                  - { name: email_subject, widget: string, hint: "Subject line of the volunteer mailto link." }
              - name: donate_card
                widget: object
                label: Donate card
                fields:
                  - { name: heading, widget: string }
                  - { name: body, widget: markdown, <<: *body_prose }
                  - { name: enabled, widget: boolean, default: false, hint: "Toggle ON when ActBlue is set up." }
                  - { name: actblue_url, widget: string, required: false }
                  - { name: pending_label, widget: string, default: "Coming soon" }

      - name: policy_auto_insurance
        label: Policy page — Auto Insurance
        file: content/pages/policy-auto-insurance.md
        fields:
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: eyebrow, widget: string }
              - { name: heading, widget: string }
              - { name: lede, widget: markdown, <<: *body_prose }
          - name: evidence
            label: Evidence section
            widget: object
            fields:
              - { name: heading, widget: string }
              - { name: lede, widget: markdown, <<: *body_prose }
              - name: risk_adjusted
                label: Risk-adjusted row (top)
                widget: object
                hint: "Studies that controlled for actual claim costs and still found a racial premium gap. The methodological backbone of the page."
                fields:
                  - { name: label, widget: string, hint: "Row label, e.g. 'After controlling for risk'" }
                  - name: citations
                    widget: list
                    fields:
                      - { name: source, widget: string, hint: "Org / outlet, may include *italic title*" }
                      - { name: date, widget: string }
                      - { name: figure, widget: string, hint: "Big number — '33 of 34', 'Peer-reviewed', etc." }
                      - { name: finding, widget: markdown, <<: *body_prose }
              - name: detroit_specific
                label: Michigan/Detroit row (bottom)
                widget: object
                hint: "Investigations that document the disparity in Michigan and Detroit. Magnitude, not methodology."
                fields:
                  - { name: label, widget: string, hint: "Row label, e.g. 'What it looks like in Michigan and Detroit'" }
                  - name: citations
                    widget: list
                    fields:
                      - { name: source, widget: string }
                      - { name: date, widget: string }
                      - { name: figure, widget: string }
                      - { name: finding, widget: markdown, <<: *body_prose }
          - name: reform_2019
            label: 2019 reform context
            widget: object
            fields:
              - { name: heading, widget: string }
              - { name: body, widget: markdown, <<: *body_prose }
          - name: pillars
            label: Policy pillars
            widget: object
            fields:
              - { name: heading, widget: string }
              - { name: lede, widget: markdown, <<: *body_prose }
              - name: items
                label: Pillars
                widget: list
                fields:
                  - { name: number, widget: string, hint: "'01', '02', ..." }
                  - { name: heading, widget: string }
                  - { name: body, widget: markdown, <<: *body_prose }
          - name: theory_of_change
            label: Theory of change
            widget: object
            fields:
              - { name: heading, widget: string }
              - { name: body, widget: markdown, <<: *body_prose }
          - name: cta
            label: Closing CTA
            widget: object
            fields:
              - { name: heading, widget: string }
              - { name: body, widget: markdown, <<: *body_prose }
              - { name: primary_label, widget: string }
              - { name: primary_target, widget: string }
              - { name: secondary_label, widget: string, required: false }
              - { name: secondary_target, widget: string, required: false }

      - name: about
        label: About page
        file: content/pages/about.md
        fields:
          - name: hero
            label: Bio hero
            widget: object
            fields:
              - { name: eyebrow, widget: string }
              - { name: name, widget: string }
              - { name: role, widget: string, hint: "One line: roles + candidate label" }
              - { name: lede, widget: markdown, <<: *body_prose }
          - name: bio_sections
            label: Bio sections
            widget: list
            types:
              - name: prose
                label: Prose section
                widget: object
                fields:
                  - { name: eyebrow, widget: string }
                  - { name: body, widget: markdown, <<: *body_prose }
              - name: list
                label: List section (e.g. Education)
                widget: object
                fields:
                  - { name: eyebrow, widget: string }
                  - name: items
                    widget: list
                    fields:
                      - { name: label, widget: string, hint: "Short tag, e.g. 'UMich'" }
                      - { name: text, widget: string }

  # ── Priorities (folder collection) ───────────────────────────────
  - name: priorities
    label: Priorities
    folder: content/priorities
    create: true
    slug: "{{slug}}"
    identifier_field: slug
    summary: "{{label}} — {{heading}}"
    fields:
      - { name: slug, label: Slug, widget: string, hint: "Used in URLs and references (lowercase, hyphenated)" }
      - { name: label, label: Short label, widget: string, hint: "1–2 words: 'Transit', 'Housing', 'Basic Needs'" }
      - { name: heading, label: Heading, widget: string }
      - { name: body, label: Body, widget: markdown, <<: *body_prose }

  # ── Signature issues (folder collection) ─────────────────────────
  - name: issues
    label: Signature issues
    folder: content/issues
    create: true
    slug: "{{slug}}"
    identifier_field: slug
    summary: "{{name}}"
    fields:
      - { name: slug, label: Slug, widget: string, hint: "Used in references (lowercase, hyphenated)" }
      - { name: name, label: Name, widget: string }
      - { name: stat_value, label: Stat value, widget: string, hint: "The big headline figure ('5×', '$1,200', '1 in 4'). Strings, not numbers." }
      - { name: stat_label, label: Stat label, widget: markdown, <<: *stat_emphasis }
      - { name: heading, label: Heading, widget: string }
      - { name: body, label: Body, widget: markdown, <<: *body_prose }
      - { name: cta_label, label: CTA label, widget: string }
      - { name: cta_target, label: CTA target, widget: string, hint: "URL or page anchor" }
