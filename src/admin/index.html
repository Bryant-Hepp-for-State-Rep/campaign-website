       authenticates via the configured backend, and mounts the editor
       UI to the body. Bryant logs in here. -->

       this, Decap's preview pane just dumps field values as plain
       text. With it, the preview iframe applies the site CSS and
       renders each page using a React component that mirrors the
       Eleventy template. -->
  <script src="/admin/preview.js"></script>
