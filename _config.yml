# Jekyll configuration — exists ONLY to tell GitHub Pages' default
# Jekyll runner to leave our actual source tree alone. The site is
# built with Eleventy via build.sh, not with Jekyll.
#
# This file can be deleted once GitHub Pages is disabled in repo
# settings (Settings → Pages → Source: None), at which point this
# whole compatibility layer becomes moot.

# Skip the directories that contain Nunjucks templates / structured
# content / node_modules / build output — Jekyll's Liquid parser
# can't read .njk syntax and would error out otherwise.
exclude:
  - src
  - content
  - node_modules
  - _site
  - dist
  - build.sh
  - package.json
  - package-lock.json
  - .eleventy.js
  - design-drafts/archive
