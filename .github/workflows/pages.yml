# Build the Eleventy site and deploy it to GitHub Pages.
#
# Required one-time setup in repo settings:
#   Settings → Pages → Source: GitHub Actions
#
# The workflow runs on every push to main. It runs the same build.sh
# we use locally — npm ci + Eleventy + filtered passthrough — and
# hands the dist/ directory to GitHub's Pages deploy action.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't pile up Pages deploys; let the latest push win, but allow
# the in-flight one to finish (so we don't half-deploy).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: bash build.sh
      # GitHub Pages skips Jekyll-processing of the deployed artifact
      # when this file is present at the root of what we upload.
      - run: touch dist/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
